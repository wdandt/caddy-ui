services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
      network: host
    container_name: caddyui-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      CADDY_ADMIN: 127.0.0.1:2019
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    command: ["sh", "-c", "mkdir -p /config/caddy && [ -f /config/caddy/autosave.json ] || echo '{}' > /config/caddy/autosave.json && exec caddy run --config /config/caddy/autosave.json --resume --adapter json"]
  
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    network_mode: host
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}

  caddy-ui:
    build:
      context: ./app
      network: host
    container_name: caddyui-dashboard
    restart: unless-stopped
    network_mode: host
    volumes:
      - caddyui_data:/app/data
    environment:
      - PORT=3000
      - NODE_ENV=production
      # Fallback admin credentials
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-caddyui_admin_secure_pass_123}
      # OIDC/SSO Configuration
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-}
      # JWT Encryption Secret (will fallback to auto-generated if empty)
      - JWT_SECRET=${JWT_SECRET:-}
      # SSO Configuration for Multi-domain
      - SSO_PORTAL_URL=${SSO_PORTAL_URL:-}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 64M

volumes:
  caddy_data:
  caddy_config:
  caddyui_data:
services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: caddyui-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      CADDY_ADMIN: ${CADDY_ADMIN:-127.0.0.1:2019}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    command:
      - sh
      - -c
      - |
        mkdir -p /config/caddy
        if [ ! -f /config/caddy/autosave.json ] || [ "$$(cat /config/caddy/autosave.json)" = "{}" ] || [ "$$(cat /config/caddy/autosave.json)" = "" ]; then
          echo '{"admin":{"listen":"{env.CADDY_ADMIN}"}}' > /config/caddy/autosave.json
        fi
        exec caddy run --config /config/caddy/autosave.json --resume --adapter json
  
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    network_mode: host
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  caddy_data:
  caddy_config: